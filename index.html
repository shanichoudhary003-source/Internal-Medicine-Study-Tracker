/* ============================================================
   TEST / QUIZ ENGINE
   ============================================================ */
let quizState=null;
function startQuiz(t,body){
  quizState={topic:t,i:0,correct:0,answered:false,results:[]};
  renderQuestion(body);
}
function normalize(s){return(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}
function checkAnswer(userText,item){
  const u=normalize(userText);
  if(!u)return false;
  const kws=item.keywords||[];
  let hits=0;
  kws.forEach(k=>{if(u.includes(normalize(k)))hits++});
  const need=item.minMatch||Math.max(1,Math.ceil(kws.length/2));
  return hits>=need;
}
function renderQuestion(body){
  const {topic,i}=quizState;
  const quiz=topic.content.quiz;
  if(i>=quiz.length){return finishQuiz(body)}
  const item=quiz[i];
  const pct=Math.round(i/quiz.length*100);
  body.innerHTML=`
    <div class="quiz-progress">
      <div class="bar"><i style="width:${pct}%"></i></div>
      <span>${i+1} / ${quiz.length}</span>
    </div>
    <div class="qcard">
      <div class="qn">Question ${i+1}</div>
      <div class="qq">${item.q}</div>
      <textarea id="ans" placeholder="Type your answer in your own words…"></textarea>
      <div class="q-actions">
        <button class="btn-primary" id="submitBtn">Submit answer</button>
        <button class="btn-ghost" id="revealBtn">Show answer</button>
      </div>
      <div id="fb"></div>
    </div>`;
  const ta=document.getElementById('ans');ta.focus();
  document.getElementById('submitBtn').onclick=()=>submitAnswer(body,false);
  document.getElementById('revealBtn').onclick=()=>submitAnswer(body,true);
  ta.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')submitAnswer(body,false)});
}
function submitAnswer(body,revealOnly){
  const {topic,i}=quizState;
  const item=topic.content.quiz[i];
  const ta=document.getElementById('ans');
  const userText=ta.value;
  if(!revealOnly && !userText.trim()){toast('Type an answer, or use “Show answer”.');return}
  ta.disabled=true;
  const ok=revealOnly?false:checkAnswer(userText,item);
  if(ok)quizState.correct++;
  quizState.results[i]=ok;
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('revealBtn').disabled=true;
  const fb=document.getElementById('fb');
  fb.innerHTML=`
    <div class="feedback ${ok?'correct':'wrong'}">
      <div class="verdict">${ok?'✓ Looks correct':(revealOnly?'Model answer':'✗ Not quite — compare with the model answer')}</div>
      <div class="model"><span class="lab">Model answer</span>${item.answer}</div>
      ${!ok?`<div class="override">Were you actually right? <button onclick="markCorrect(this)">Count as correct</button> — automated checking only matches keywords, so trust your own judgement.</div>`:''}
    </div>
    <div class="q-actions" style="margin-top:16px">
      <button class="btn-primary" id="nextBtn">${i+1>=topic.content.quiz.length?'See results →':'Next question →'}</button>
    </div>`;
  document.getElementById('nextBtn').onclick=()=>{quizState.i++;renderQuestion(body)};
}
function markCorrect(btn){
  const i=quizState.i;
  if(!quizState.results[i]){quizState.results[i]=true;quizState.correct++}
  btn.closest('.feedback').className='feedback correct';
  btn.closest('.feedback').querySelector('.verdict').textContent='✓ Counted as correct';
  btn.closest('.override').remove();
}
function finishQuiz(body){
  const {topic,correct}=quizState;
  const total=topic.content.quiz.length;
  const pct=Math.round(correct/total*100);
  /* save best */
  const prev=getP(topic.key).quiz;
  const best=(!prev||correct/total>=prev.correct/prev.total)?{correct,total}:prev;
  setP(topic.key,{quiz:best,mastered:getP(topic.key).mastered||pct===100});
  const msg=pct===100?'Perfect — topic mastered.':pct>=60?'Solid. Review the misses and try again.':'Worth another pass through the Learn notes.';
  body.innerHTML=`<div class="quiz-done">
    <div class="score">${correct}/${total}</div>
    <p>${pct}% · ${msg}</p>
    <div class="learn-actions" style="justify-content:center">
      <button class="btn-primary" onclick="switchMode('test')">Retry test</button>
      <button class="btn-ghost" onclick="switchMode('learn')">Back to notes</button>
      <button class="btn-ghost" onclick="switchMode('flash')">Flashcards</button>
    </div></div>`;
  refreshStatusUI();
}

/* ============================================================
   SYNC  (copy-paste code + file fallback)
   ============================================================ */
function progressToCode(){
  const json=JSON.stringify(progress);
  return 'MUIM1-'+btoa(unescape(encodeURIComponent(json)));
}
function codeToProgress(code){
  code=(code||'').trim().replace(/\s+/g,'');
  if(code.startsWith('MUIM1-'))code=code.slice(6);
  const json=decodeURIComponent(escape(atob(code)));
  const obj=JSON.parse(json);
  if(typeof obj!=='object'||obj===null)throw new Error('bad');
  return obj;
}
function applyProgress(obj){
  progress=obj;saveProgress();
  buildNav(document.getElementById('search').value);
  render();refreshStatusUI();
}
function downloadBackup(){
  const data=JSON.stringify({app:'mu-sofia-im',version:1,exported:new Date().toISOString(),progress},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='mu-sofia-im-progress.json';a.click();
  URL.revokeObjectURL(url);toast('Saved to a file');
}

const syncModal=document.getElementById('syncModal');
function openSync(focusRestore){
  document.getElementById('syncOut').value=progressToCode();
  document.getElementById('syncIn').value='';
  syncModal.classList.add('show');
  if(focusRestore)setTimeout(()=>document.getElementById('syncIn').focus(),50);
}
function closeSync(){syncModal.classList.remove('show')}

document.getElementById('exportBtn').onclick=()=>openSync(false);
document.getElementById('importBtn').onclick=()=>openSync(true);
document.getElementById('syncClose').onclick=closeSync;
syncModal.onclick=e=>{if(e.target===syncModal)closeSync()};

document.getElementById('syncCopy').onclick=()=>{
  const ta=document.getElementById('syncOut');ta.select();
  const done=()=>toast('Code copied — paste it on your other device');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(done).catch(()=>{document.execCommand('copy');done()});
  }else{document.execCommand('copy');done()}
};
document.getElementById('syncDownload').onclick=downloadBackup;

document.getElementById('syncRestore').onclick=()=>{
  const val=document.getElementById('syncIn').value;
  if(!val.trim()){toast('Paste a code first');return}
  try{
    const obj=codeToProgress(val);
    if(!confirm('Load this progress code?\nIt will replace the progress currently on this device.'))return;
    applyProgress(obj);closeSync();toast('Progress loaded');
  }catch(err){toast('That code could not be read — check you copied all of it')}
};
document.getElementById('syncRestoreFile').onclick=()=>document.getElementById('importFile').click();

document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      const obj=d&&d.progress?d.progress:d;
      if(obj&&typeof obj==='object'){applyProgress(obj);closeSync();toast('Progress restored')}
      else toast('That file has no progress data')
    }catch(err){toast('Could not read that file')}
    e.target.value='';
  };
  r.readAsText(f);
};

/* ============================================================
   SUBJECT SWITCHING
   ============================================================ */
function updateBrand(){
  const s=SUBJECTS[activeSubject];
  document.getElementById('brandEyebrow').textContent='MU Sofia · '+s.name;
  document.getElementById('brandSub').textContent='Learn · Test · Revise · '+TOPICS.length+' topics';
  document.querySelectorAll('.subj-btn').forEach(b=>b.classList.toggle('active',b.dataset.subj===activeSubject));
  document.title=s.name+' — State Exam Revision · MU Sofia';
}
function switchSubject(id){
  if(id===activeSubject)return;
  loadSubject(id);
  for(const k in collapsed)delete collapsed[k];
  currentKey=null; route='dashboard';
  document.getElementById('search').value='';
  updateBrand();
  buildNav();
  render();
  refreshStatusUI();
  document.getElementById('main').scrollTop=0;
  closeSidebar();
  toast('Switched to '+SUBJECTS[id].name);
}
document.querySelectorAll('.subj-btn').forEach(b=>b.onclick=()=>switchSubject(b.dataset.subj));

/* ============================================================
   INIT
   ============================================================ */
initTheme();
let savedSubject='im';
try{savedSubject=localStorage.getItem(SUBJECT_KEY)||'im'}catch(e){}
loadSubject(savedSubject);
updateBrand();
buildNav();
render();
refreshStatusUI();
</script>
